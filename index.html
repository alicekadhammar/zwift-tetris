<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zwift-Tetris Pro</title>
    
    <!-- PWA Settings -->
    <meta name="theme-color" content="#141923">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --neon-pink: #ff00cc;
            --neon-blue: #00d2ff;
            --bg-dark: #0d1117;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(-45deg, #2d1b4e, #1a1a2e, #16213e, #0f3460);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Bicycle Animation */
        .bicycle-rider {
            position: fixed;
            z-index: 1;
            animation: rideAround 25s linear infinite;
            filter: drop-shadow(0 0 8px var(--neon-pink));
            pointer-events: none;
        }

        @keyframes rideAround {
            0% { top: 10%; left: -100px; transform: scaleX(1); }
            45% { top: 10%; left: 110%; transform: scaleX(1); }
            50% { top: 80%; left: 110%; transform: scaleX(-1); }
            95% { top: 80%; left: -100px; transform: scaleX(-1); }
            100% { top: 10%; left: -100px; transform: scaleX(1); }
        }

        h1 {
            font-size: 2.5rem;
            margin: 20px 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-pink);
            z-index: 10;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            background: rgba(13, 17, 23, 0.9);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
            z-index: 10;
            width: 90%;
            max-width: 500px;
        }

        .screen.active { display: flex; }

        /* Game Board */
        #game-container {
            display: none;
            gap: 20px;
            z-index: 10;
            padding: 20px;
        }

        #game-container.active { display: flex; }

        canvas {
            background: #000;
            border: 4px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .stats-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 150px;
        }

        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-label { font-size: 0.8rem; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: var(--neon-blue); }

        .btn {
            background: linear-gradient(90deg, var(--neon-blue), #3a7bd5);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
            transition: all 0.2s;
            text-transform: uppercase;
            width: 100%;
        }

        .btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--neon-blue); }
        .btn.pink { background: linear-gradient(90deg, var(--neon-pink), #8e2de2); }
        .btn.orange { background: linear-gradient(90deg, #f6ad55 0%, #dd6b20 100%); }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            background: #ff4444;
        }
        .status-dot.on { background: #44ff44; box-shadow: 0 0 10px #44ff44; }

        .gamepad-hint {
            font-size: 0.8rem;
            color: #888;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Animation: Cycling Girl -->
    <svg class="bicycle-rider" viewBox="0 0 100 100" width="80" height="80">
        <circle cx="25" cy="75" r="15" fill="none" stroke="#fff" stroke-width="2"/>
        <circle cx="75" cy="75" r="15" fill="none" stroke="#fff" stroke-width="2"/>
        <path d="M25 75 L45 45 L75 45 L75 75 M45 45 L50 75" fill="none" stroke="#fff" stroke-width="3"/>
        <circle cx="60" cy="25" r="8" fill="#ffccaa"/>
        <path d="M50 75 L40 35 L65 45" fill="none" stroke="#ff00cc" stroke-width="5"/>
    </svg>

    <h1>Zwift-Tetris</h1>

    <!-- START SCREEN -->
    <div id="start-screen" class="screen active">
        <div class="stat-box" style="width: 100%; margin-bottom: 20px;">
            <div style="margin-bottom: 10px;">
                <span id="power-dot" class="status-dot"></span> Power Meter
            </div>
            <div>
                <span id="gamepad-dot" class="status-dot"></span> Gamepad / Zwift Play
            </div>
        </div>

        <button class="btn" onclick="connectPower()">Connect Power Meter</button>
        <button class="btn orange" onclick="connectZwiftPlayBLE()" id="btn-zwiftplay">Search Zwift Play (Aggressive)</button>
        <button class="btn pink" onclick="startGame()">Start Game</button>
        
        <p class="gamepad-hint">Press any button on your controller to wake it up!</p>
        <div style="font-size: 0.6rem; color: #444; margin-top: 20px;">v2.1.0 - English / Aggressive BLE</div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-container">
        <div class="stats-panel">
            <div class="stat-box">
                <div class="stat-label">Power</div>
                <div id="watt-val" class="stat-value">0W</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Next</div>
                <canvas id="next-canvas" width="80" height="80"></canvas>
            </div>
        </div>

        <canvas id="tetris" width="240" height="400"></canvas>

        <div class="stats-panel">
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div id="score-val" class="stat-value">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Hold</div>
                <canvas id="hold-canvas" width="80" height="80"></canvas>
            </div>
            <button class="btn pink" style="padding: 10px; font-size: 0.8rem;" onclick="location.reload()">Quit</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next-canvas');
        const nextCtx = nextCanvas.getContext('2d');
        const holdCanvas = document.getElementById('hold-canvas');
        const holdCtx = holdCanvas.getContext('2d');
        
        const grid = 20; 
        context.scale(grid, grid);
        nextCtx.scale(grid, grid);
        holdCtx.scale(grid, grid);

        const colors = [
            null,
            '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF',
        ];

        let board = Array.from({length: 20}, () => Array(12).fill(0));
        let player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };
        let nextPiece = null;
        let heldPieceType = null;
        let canHold = true;
        let currentWatts = 0;
        let gameRunning = false;

        // --- GAMEPAD LOGIC (HID & BLE) ---
        let gamepadIndex = null;
        window.addEventListener("gamepadconnected", (e) => {
            console.log("Gamepad connected:", e.gamepad.id);
            gamepadIndex = e.gamepad.index;
            document.getElementById('gamepad-dot').classList.add('on');
        });

        async function connectZwiftPlayBLE() {
            try {
                document.getElementById('btn-zwiftplay').innerText = "SEARCHING...";
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [
                        '00001801-0000-1000-8000-00805f9b34fb',
                        '0000180f-0000-1000-8000-00805f9b34fb',
                        '00001812-0000-1000-8000-00805f9b34fb', // HID Service
                    ]
                });
                await device.gatt.connect();
                document.getElementById('gamepad-dot').classList.add('on');
                document.getElementById('btn-zwiftplay').innerText = "PAIRED: " + device.name;
                alert("Paired with " + device.name + "!\nIf controls don't work, ensure no other apps are using the controller.");
            } catch (err) {
                console.error(err);
                document.getElementById('btn-zwiftplay').innerText = "Search Failed - Try Again";
            }
        }

        let lastInputTime = 0;
        function handleGamepadInput() {
            if (gamepadIndex === null) return;
            const gp = navigator.getGamepads()[gamepadIndex];
            if (!gp) return;

            const now = Date.now();
            if (now - lastInputTime < 150) return;

            // D-Pad or Joysticks
            if (gp.axes[0] < -0.5 || gp.buttons[14]?.pressed) { movePlayer(-1); lastInputTime = now; }
            if (gp.axes[0] > 0.5 || gp.buttons[15]?.pressed) { movePlayer(1); lastInputTime = now; }
            
            // Buttons A/B/X/Y or Zwift Primary
            if (gp.buttons[0]?.pressed || gp.buttons[1]?.pressed || gp.buttons[2]?.pressed) { rotatePlayer(); lastInputTime = now; }
            if (gp.buttons[13]?.pressed || gp.axes[1] > 0.5) { dropPlayer(); lastInputTime = now; }
            
            // Hold function (Bumper/Trigger)
            if (gp.buttons[4]?.pressed || gp.buttons[5]?.pressed) { holdPieceAction(); lastInputTime = now; }
        }

        // --- TETRIS FUNCTIONS ---
        function createPiece(type) {
            if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
            if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
            if (type === 'O') return [[4,4],[4,4]];
            if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
            if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);

            board.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) drawBlock(x, y, colors[value], context);
                });
            });

            if (player.matrix) {
                player.matrix.forEach((row, y) => {
                    row.forEach((value, x) => {
                        if (value !== 0) drawBlock(x + player.pos.x, y + player.pos.y, colors[value], context);
                    });
                });
            }
        }

        function drawBlock(x, y, color, ctx) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, 1, 1);
            ctx.lineWidth = 0.05;
            ctx.strokeStyle = 'white';
            ctx.strokeRect(x, y, 1, 1);
        }

        function drawPreview(matrix, ctx) {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 4, 4);
            if (!matrix) return;
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x, y, 1, 1);
                        ctx.strokeRect(x, y, 1, 1);
                    }
                });
            });
        }

        function movePlayer(dir) {
            player.pos.x += dir;
            if (collide()) player.pos.x -= dir;
        }

        function rotatePlayer() {
            const m = player.matrix;
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [m[x][y], m[y][x]] = [m[y][x], m[x][y]];
                }
            }
            m.forEach(row => row.reverse());
            if (collide()) m.forEach(row => row.reverse());
        }

        function dropPlayer() {
            player.pos.y++;
            if (collide()) {
                player.pos.y--;
                merge();
                resetPlayer();
                sweepRows();
            }
            dropCounter = 0;
        }

        function holdPieceAction() {
            if (!canHold) return;
            const currentType = getPieceType(player.matrix);
            if (heldPieceType === null) {
                heldPieceType = currentType;
                resetPlayer();
            } else {
                const temp = heldPieceType;
                heldPieceType = currentType;
                player.matrix = createPiece(temp);
                player.pos.y = 0;
                player.pos.x = (board[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            }
            canHold = false;
            drawPreview(createPiece(heldPieceType), holdCtx);
        }

        function getPieceType(m) {
            const sum = m.flat().reduce((a,b) => a+b, 0);
            if (sum === 4) return 'I'; // 4*1
            if (sum === 8) return 'L'; // 4*2
            if (sum === 12) return 'J'; // 4*3
            if (sum === 16) return 'O'; // 4*4
            if (sum === 20) return 'Z'; // 4*5
            if (sum === 24) return 'S'; // 4*6
            if (sum === 28) return 'T'; // 4*7
            return 'I';
        }

        function collide() {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (board[y + o.y] && board[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge() {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) board[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function resetPlayer() {
            const pieces = 'ILJOTSZ';
            if (nextPiece === null) nextPiece = pieces[pieces.length * Math.random() | 0];
            player.matrix = createPiece(nextPiece);
            nextPiece = pieces[pieces.length * Math.random() | 0];
            drawPreview(createPiece(nextPiece), nextCtx);
            
            player.pos.y = 0;
            player.pos.x = (board[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            canHold = true;
            if (collide()) {
                board.forEach(row => row.fill(0));
                player.score = 0;
                updateScore();
            }
        }

        function sweepRows() {
            outer: for (let y = board.length - 1; y > 0; --y) {
                for (let x = 0; x < board[y].length; ++x) {
                    if (board[y][x] === 0) continue outer;
                }
                const row = board.splice(y, 1)[0].fill(0);
                board.unshift(row);
                ++y;
                player.score += 10;
                updateScore();
            }
        }

        function updateScore() {
            document.getElementById('score-val').innerText = player.score;
        }

        // --- BLUETOOTH POWER ---
        async function connectPower() {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ['cycling_power'] }] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('cycling_power');
                const char = await service.getCharacteristic('cycling_power_measurement');
                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (e) => {
                    currentWatts = e.target.value.getInt16(2, true);
                    document.getElementById('watt-val').innerText = currentWatts + "W";
                });
                document.getElementById('power-dot').classList.add('on');
            } catch (err) { console.log(err); }
        }

        // --- GAME LOOP ---
        let dropCounter = 0;
        let lastTime = 0;

        function update(time = 0) {
            if (!gameRunning) return;
            const deltaTime = time - lastTime;
            lastTime = time;

            handleGamepadInput();

            dropCounter += deltaTime;
            let speed = Math.max(100, 1000 - (currentWatts * 2.5));
            if (dropCounter > speed) dropPlayer();

            draw();
            requestAnimationFrame(update);
        }

        function startGame() {
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('game-container').classList.add('active');
            gameRunning = true;
            resetPlayer();
            update();
        }

        document.addEventListener('keydown', e => {
            if (e.keyCode === 37) movePlayer(-1);
            if (e.keyCode === 39) movePlayer(1);
            if (e.keyCode === 40) dropPlayer();
            if (e.keyCode === 38) rotatePlayer();
            if (e.keyCode === 67) holdPieceAction(); // 'C' for hold
        });

    </script>
</body>
</html>
