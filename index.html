<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zwift-Tetris</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#141923">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <style>
        /* Färgglad animerad bakgrund */
        body {
            margin: 0;
            padding: 20px 0;
            min-height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow-y: auto;
            overflow-x: hidden;
            background: linear-gradient(-45deg, #ff00cc, #333399, #00d2ff, #f953c6);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Cykelanimation */
        .bicycle-rider {
            position: fixed;
            z-index: 1;
            animation: rideAround 20s linear infinite;
            filter: drop-shadow(0 0 10px rgba(255, 0, 204, 0.6));
            pointer-events: none;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        .wheel { animation: spin 0.8s linear infinite; }
        
        @keyframes pedal { 
            0% { transform: rotate(-15deg); } 
            100% { transform: rotate(15deg); } 
        }
        .leg { 
            animation: pedal 0.4s infinite alternate ease-in-out; 
            transform-origin: 40px 38px; 
        }
        .leg-back { 
            animation: pedal 0.4s infinite alternate-reverse ease-in-out; 
            transform-origin: 40px 38px; 
        }
        
        @keyframes bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
        }
        .rider-body { 
            animation: bob 0.4s ease-in-out infinite; 
        }

        @keyframes rideAround {
            0%     { top: 10px; left: 10px; transform: scaleX(1) rotate(0deg); }
            24.9%  { top: 10px; left: calc(100vw - 90px); transform: scaleX(1) rotate(0deg); }
            25%    { top: 10px; left: calc(100vw - 90px); transform: scaleX(1) rotate(90deg); }
            49.9%  { top: calc(100vh - 90px); left: calc(100vw - 90px); transform: scaleX(1) rotate(90deg); }
            50%    { top: calc(100vh - 90px); left: calc(100vw - 90px); transform: scaleX(-1) rotate(0deg); }
            74.9%  { top: calc(100vh - 90px); left: 10px; transform: scaleX(-1) rotate(0deg); }
            75%    { top: calc(100vh - 90px); left: 10px; transform: scaleX(1) rotate(-90deg); }
            99.9%  { top: 10px; left: 10px; transform: scaleX(1) rotate(-90deg); }
            100%   { top: 10px; left: 10px; transform: scaleX(1) rotate(0deg); }
        }

        h1 {
            color: #fff;
            font-size: 3.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px rgba(255, 0, 204, 0.8);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            background: rgba(20, 25, 35, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 650px;
            width: 95%;
            position: relative;
            z-index: 10;
        }

        .screen.active {
            display: flex;
        }

        .btn {
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            margin: 10px 0;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.6);
        }
        
        .btn.secondary {
            background: linear-gradient(90deg, #ff00cc 0%, #333399 100%);
        }

        .game-layout {
            display: flex;
            flex-direction: row;
            gap: 20px;
            align-items: flex-start;
            justify-content: center;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100px;
        }

        canvas {
            background-color: #0d1117;
            border: 3px solid #3a7bd5;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(58, 123, 213, 0.5);
        }

        .mini-canvas {
            width: 80px;
            height: auto;
            border: 2px solid #3a7bd5;
            box-shadow: 0 0 10px rgba(58, 123, 213, 0.3);
            display: block;
            margin: 0 auto;
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 200px;
        }

        .panel-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .score-box h3 {
            margin: 0 0 5px 0;
            font-size: 0.9rem;
            color: #a0aec0;
            text-transform: uppercase;
        }

        .score-box span {
            display: block;
            font-size: 2rem;
            font-weight: bold;
            color: #00d2ff;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        .status-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            margin-bottom: 20px;
            text-align: center;
            box-sizing: border-box;
        }

        .status-indicator {
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            background-color: #e53e3e;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .status-indicator.connected {
            background-color: #48bb78;
            box-shadow: 0 0 15px rgba(72, 187, 120, 0.5);
        }

        @media (max-width: 768px) {
            .game-layout { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

    <!-- Animaterad cyklande tjej -->
    <svg class="bicycle-rider" viewBox="0 0 100 100" width="80" height="80">
        <g class="wheel" style="transform-origin: 25px 75px;">
            <circle cx="25" cy="75" r="16" fill="none" stroke="#a0aec0" stroke-width="3"/>
            <circle cx="25" cy="75" r="12" fill="none" stroke="#00d2ff" stroke-width="2" stroke-dasharray="6 6"/>
            <circle cx="25" cy="75" r="3" fill="#ff00cc"/>
        </g>
        <g class="wheel" style="transform-origin: 75px 75px;">
            <circle cx="75" cy="75" r="16" fill="none" stroke="#a0aec0" stroke-width="3"/>
            <circle cx="75" cy="75" r="12" fill="none" stroke="#00d2ff" stroke-width="2" stroke-dasharray="6 6"/>
            <circle cx="75" cy="75" r="3" fill="#ff00cc"/>
        </g>
        <path d="M25 75 L45 45 L70 45 L75 75 M45 45 L50 75 L70 45" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M42 45 L40 35 M32 35 L46 35" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
        <path d="M70 45 L67 32 L75 32" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
        <g class="rider-body">
            <path d="M40 38 L52 55 L50 75" fill="none" stroke="#b8328f" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" class="leg-back"/>
            <path d="M40 38 L52 55 L50 75" fill="none" stroke="#ff00cc" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" class="leg"/>
            <path d="M40 38 L55 20" fill="none" stroke="#f953c6" stroke-width="8" stroke-linecap="round"/>
            <path d="M55 20 L68 32" fill="none" stroke="#ff00cc" stroke-width="5" stroke-linecap="round"/>
            <circle cx="60" cy="12" r="7" fill="#ffe0bd"/>
            <path d="M53 12 A 7 7 0 0 1 67 12 Z" fill="#00d2ff"/>
            <path d="M54 12 Q40 10 35 20" fill="none" stroke="#f6ad55" stroke-width="4" stroke-linecap="round"/>
        </g>
    </svg>

    <h1>Zwift-Tetris</h1>
    
    <div id="start-screen" class="screen active">
        <div class="status-box">
            <h3 style="margin: 0 0 15px 0; color: #00d2ff;">Connect Equipment</h3>
            
            <button class="btn secondary" style="font-size: 1rem; padding: 10px 20px;" onclick="connectPowerMeter()" id="btn-power">
                Connect Power Meter (Bluetooth)
            </button>
            <div id="ble-status" class="status-indicator">No power meter connected</div>
            
            <button class="btn secondary" style="font-size: 1rem; padding: 10px 20px; margin-top: 15px; background: linear-gradient(90deg, #f6ad55 0%, #dd6b20 100%);" onclick="connectZwiftPlayBLE()" id="btn-zwiftplay">
                Search Zwift Play (Aggressive)
            </button>
            
            <div style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
                <span style="font-size: 0.8rem; color: #a0aec0;">Status:</span>
                <div id="menu-gamepad-status" class="status-indicator">No gamepad connected</div>
            </div>
        </div>

        <button class="btn" onclick="startGame()">Play Now</button>
        <button class="btn secondary" onclick="showLeaderboard()">Leaderboard</button>
    </div>

    <div id="game-screen" class="screen" style="padding: 20px; background: rgba(20, 25, 35, 0.6);">
        <div class="game-layout">
            <div class="side-panel">
                <div class="panel-box score-box">
                    <h3>Hold</h3>
                    <canvas id="hold-canvas" width="80" height="80" class="mini-canvas"></canvas>
                </div>
            </div>
            <canvas id="tetris" width="240" height="400"></canvas>
            <div class="info-panel">
                <div class="panel-box score-box">
                    <h3>Next</h3>
                    <canvas id="next-canvas" width="80" height="240" class="mini-canvas"></canvas>
                </div>
                <div class="panel-box score-box" style="border-color: #f953c6;">
                    <h3 style="color: #f953c6;">Power</h3>
                    <span id="watt-display" style="color: #f953c6;">0 W</span>
                </div>
                <div class="panel-box score-box">
                    <h3>Score</h3>
                    <span id="score">0</span>
                </div>
                <button class="btn secondary" style="font-size: 0.9rem; padding: 10px; width: 100%;" onclick="quitGame()">Quit</button>
            </div>
        </div>
    </div>

    <div id="game-over-screen" class="screen">
        <h2 style="font-size: 2.5rem; color: #ff00cc; margin: 0;">Game Over!</h2>
        <p>Final Score: <strong id="final-score" style="color: #00d2ff; font-size: 2rem;">0</strong></p>
        <input type="text" id="player-name" placeholder="Enter name" maxlength="12">
        <button class="btn" onclick="saveScore()">Save Score</button>
        <button class="btn secondary" onclick="showStartScreen()">Main Menu</button>
    </div>

    <div id="leaderboard-screen" class="screen">
        <h2 style="color: #00d2ff; margin-top: 0;">Top Riders</h2>
        <ol id="leaderboard-list" class="leaderboard-list"></ol>
        <button class="btn" onclick="showStartScreen()">Back</button>
    </div>

    <script>
        let gameState = 'START';
        let currentWatts = 0;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function showStartScreen() { gameState = 'START'; showScreen('start-screen'); }
        function quitGame() { gameState = 'START'; showStartScreen(); }

        async function connectPowerMeter() {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ['cycling_power'] }] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('cycling_power');
                const characteristic = await service.getCharacteristic('cycling_power_measurement');
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (e) => {
                    currentWatts = e.target.value.getInt16(2, true);
                    document.getElementById('watt-display').innerText = currentWatts + " W";
                });
                document.getElementById('ble-status').innerText = "Connected: " + device.name;
                document.getElementById('ble-status').classList.add('connected');
                document.getElementById('btn-power').style.display = "none";
            } catch (err) { alert("Power Meter Error: " + err.message); }
        }

        // --- UPPDATERAD ZWIFT PLAY LOGIK (Aggressiv sökning) ---
        async function connectZwiftPlayBLE() {
            try {
                document.getElementById('btn-zwiftplay').innerText = "SEARCHING EVERYTHING...";
                
                // Vi använder acceptAllDevices för att tvinga fram allt, 
                // då Mac ibland gömmer enheter med specifika namn-prefix.
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [
                        '00001801-0000-1000-8000-00805f9b34fb', // Generic Attribute
                        '0000180f-0000-1000-8000-00805f9b34fb', // Battery
                        '00001812-0000-1000-8000-00805f9b34fb', // HID (Viktig för spelsignaler)
                    ]
                });

                document.getElementById('btn-zwiftplay').innerText = "CONNECTING...";
                const server = await device.gatt.connect();
                
                document.getElementById('menu-gamepad-status').textContent = "Device Paired: " + device.name;
                document.getElementById('menu-gamepad-status').classList.add('connected');
                document.getElementById('btn-zwiftplay').style.display = "none";
                
                alert("Paired with " + device.name + "!\n\nIMPORTANT: If buttons don't work, turn off Bluetooth on your phone and RESTART the controller to break any Companion App links.");

            } catch (err) { 
                console.error(err);
                alert("Search stopped: " + err.message); 
                document.getElementById('btn-zwiftplay').innerText = "Search Zwift Play (Aggressive)"; 
            }
        }

        // --- TETRIS-LOGIK ---
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const holdCanvas = document.getElementById('hold-canvas');
        const holdContext = holdCanvas.getContext('2d');
        const nextCanvas = document.getElementById('next-canvas');
        const nextContext = nextCanvas.getContext('2d');

        context.scale(20, 20);
        holdContext.scale(20, 20);
        nextContext.scale(20, 20);

        function createPiece(type) {
            if (type === 'T') return [[0,0,0],[1,1,1],[0,1,0]];
            if (type === 'O') return [[2,2],[2,2]];
            if (type === 'L') return [[0,3,0],[0,3,0],[0,3,3]];
            if (type === 'J') return [[0,4,0],[0,4,0],[4,4,0]];
            if (type === 'I') return [[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]];
            if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            if (type === 'Z') return [[7,7,0],[0,7,7],[0,0,0]];
        }

        const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];
        let board = Array.from({length: 20}, () => Array(12).fill(0));
        const player = { pos: {x:0, y:0}, matrix: null, score: 0 };
        let nextQueue = [], heldType = null, canHold = true, currentType = null;
        let particles = [];

        function playerReset() {
            if (nextQueue.length === 0) nextQueue = Array.from({length:3}, () => 'TJLOSZI'[Math.random()*7|0]);
            currentType = nextQueue.shift();
            nextQueue.push('TJLOSZI'[Math.random()*7|0]);
            player.matrix = createPiece(currentType);
            player.pos = {y: 0, x: (board[0].length/2|0) - (player.matrix[0].length/2|0)};
            canHold = true;
            drawNext(); drawHold();
            if (collide()) gameOver();
        }

        function collide() {
            const [m, o] = [player.matrix, player.pos];
            for (let y=0; y<m.length; ++y) {
                for (let x=0; x<m[y].length; ++x) {
                    if (m[y][x] !== 0 && (board[y+o.y] && board[y+o.y][x+o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge() {
            player.matrix.forEach((row, y) => {
                row.forEach((val, x) => {
                    if (val !== 0) board[y+player.pos.y][x+player.pos.x] = val;
                });
            });
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = board.length - 1; y >= 0; --y) {
                for (let x = 0; x < board[y].length; ++x) if (board[y][x] === 0) continue outer;
                for(let i=0; i<40; i++) particles.push({x: Math.random()*12, y: y, vx: (Math.random()-0.5)*0.8, vy: (Math.random()-0.5)*0.8, life: 1, color: `hsl(${Math.random()*360}, 100%, 60%)`});
                board.splice(y, 1);
                board.unshift(new Array(12).fill(0));
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
                document.getElementById('score').innerText = player.score;
            }
        }

        function playerDrop() {
            player.pos.y++;
            if (collide()) { player.pos.y--; merge(); playerReset(); arenaSweep(); }
            dropCounter = 0;
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            const m = player.matrix;
            for (let y=0; y<m.length; ++y) for (let x=0; x<y; ++x) [m[x][y], m[y][x]] = [m[y][x], m[x][y]];
            if (dir > 0) m.forEach(row => row.reverse()); else m.reverse();
            while (collide()) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > m[0].length) { player.pos.x = pos; return; }
            }
        }

        function holdPiece() {
            if (!canHold) return;
            if (heldType === null) { heldType = currentType; playerReset(); }
            else { [heldType, currentType] = [currentType, heldType]; player.matrix = createPiece(currentType); player.pos.y = 0; }
            canHold = false; drawHold(); drawNext();
        }

        function drawNext() {
            nextContext.fillStyle = '#0d1117'; nextContext.fillRect(0,0,80,240);
            nextQueue.forEach((t, i) => drawMini(createPiece(t), nextContext, 0.5, i*3.5+1));
        }

        function drawHold() {
            holdContext.fillStyle = '#0d1117'; holdContext.fillRect(0,0,80,80);
            if (heldType) drawMini(createPiece(heldType), holdContext, 0.5, 0.5);
        }

        function drawMini(m, ctx, ox, oy) {
            m.forEach((row, y) => row.forEach((v, x) => {
                if (v) { ctx.fillStyle = colors[v]; ctx.fillRect(x+ox, y+oy, 1, 1); ctx.strokeRect(x+ox, y+oy, 1, 1); }
            }));
        }

        function draw() {
            context.fillStyle = '#0d1117'; context.fillRect(0,0,240,400);
            board.forEach((row, y) => row.forEach((v, x) => { if (v) { context.fillStyle = colors[v]; context.fillRect(x,y,1,1); context.strokeRect(x,y,1,1); } }));
            if(player.matrix) {
                player.matrix.forEach((row, y) => row.forEach((v, x) => { if (v) { context.fillStyle = colors[v]; context.fillRect(x+player.pos.x, y+player.pos.y, 1, 1); context.strokeRect(x+player.pos.x, y+player.pos.y, 1, 1); } }));
            }
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
                else { context.globalAlpha = p.life; context.fillStyle = p.color; context.fillRect(p.x, p.y, 0.2, 0.2); }
            });
            context.globalAlpha = 1;
        }

        let dropCounter = 0, lastTime = 0;
        function update(time = 0) {
            if (gameState !== 'PLAYING') return;
            const dt = time - lastTime; lastTime = time;
            dropCounter += dt;
            if (dropCounter > Math.min(2500, Math.max(150, 400 + (currentWatts * 4)))) playerDrop();
            draw();
            requestAnimationFrame(update);
        }

        function startGame() { gameState = 'PLAYING'; board.forEach(r => r.fill(0)); player.score = 0; playerReset(); showScreen('game-screen'); update(); }
        function gameOver() { gameState = 'GAMEOVER'; document.getElementById('final-score').innerText = player.score; showScreen('game-over-screen'); }
        function saveScore() {
            let n = document.getElementById('player-name').value || "Rider";
            let s = JSON.parse(localStorage.getItem('zScores')) || [];
            s.push({n, s: player.score});
            localStorage.setItem('zScores', JSON.stringify(s.sort((a,b)=>b.s-a.s).slice(0,10)));
            showLeaderboard();
        }
        function showLeaderboard() {
            let s = JSON.parse(localStorage.getItem('zScores')) || [];
            document.getElementById('leaderboard-list').innerHTML = s.map(x => `<li><span>${x.n}</span><span>${x.s}</span></li>`).join('');
            showScreen('leaderboard-screen');
        }

        document.addEventListener('keydown', e => {
            if (gameState !== 'PLAYING') return;
            if (e.keyCode === 37) { player.pos.x--; if (collide()) player.pos.x++; }
            if (e.keyCode === 39) { player.pos.x++; if (collide()) player.pos.x--; }
            if (e.keyCode === 40) playerDrop();
            if (e.keyCode === 38) playerRotate(1);
            if (e.keyCode === 16 || e.keyCode === 67) holdPiece();
        });

        showStartScreen();
    </script>
</body>
</html>
